    <meta property="og:description" content="Play Arcade — 50+ free browser games. Pac-Man, Snake, Tetris, Solitaire, Minesweeper and more. Instant play, no download." />

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Play Arcade",
      "description": "Play Arcade is your ultimate destination for free online games — 50+ classic arcade, puzzle, sports, and casual games playable instantly in your browser.",
      "url": "https://playarcade.gg/"
    }

    <!-- Preload hero background image (LCP element on homepage) -->
    <link rel="preload" as="image" type="image/webp" fetchpriority="high"
          imagesrcset="/hero-bg-480.webp 480w, /hero-bg-960.webp 960w, /hero-bg.webp 1498w"
          imagesizes="(max-width: 640px) 480px, (max-width: 1024px) 960px, 1498px" />

    <link rel="dns-prefetch" href="https://ubg365.github.io" />
