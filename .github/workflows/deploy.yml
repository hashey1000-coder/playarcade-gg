name: Deploy PlayArcade

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build:static

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy site
        run: |
          tar czf site.tar.gz -C dist/public .
          scp -P 22 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            site.tar.gz \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:~/site.tar.gz
          ssh -p 22 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "cd /home/juliaspl/playarcade.gg && find . -not -name '.' -delete && tar xzf ~/site.tar.gz && rm ~/site.tar.gz"

      - name: Restore IndexNow submitted-URL state
        uses: actions/cache@v4
        with:
          path: .indexnow-state.json
          # Key includes SHA so a new entry is saved after each successful run.
          # restore-keys fallback picks up the most recent previous run's state.
          key: indexnow-state-${{ github.sha }}
          restore-keys: |
            indexnow-state-

      - name: Submit new URLs to Bing IndexNow
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/indexnow.mjs